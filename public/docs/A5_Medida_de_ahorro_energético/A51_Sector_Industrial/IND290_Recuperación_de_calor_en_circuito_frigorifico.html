<!-- SheetJS: exporta el JSON editado (excelData en sessionStorage) a un .xlsx real,
     una hoja por cada clave del objeto. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// datos[nombreHoja] = array-of-arrays, fila 0 = cabecera, resto = filas de datos.
let datos = {};

// Misma idea que sessionStorage.setItem("excelData", ...) en AppXLS.jsx:
// el JSON editado vive en la sesión y es la fuente de verdad al enviar a la API.
const SESSION_KEY = 'excelData';

function urlBase(sufijo) {
  return document.getElementById('apiUrl').value.replace(/\/f$/, sufijo);
}

function mostrarEstado(mensaje, tipo) {
  const el = document.getElementById('estado');
  el.textContent = mensaje;
  el.className = tipo || '';
}

function guardarEnSesion() {
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(datos));
}

// ==========================================
// Carga de /i y construcción dinámica de tabs
// ==========================================

async function cargarInputs({ forzarReset = false } = {}) {
  mostrarEstado('Cargando inputs…');
  try {
    let cargadoDeSesion = false;

    if (forzarReset) {
      // Reinicio explícito (botón "Recargar inputs"): descartamos la sesión
      // y volvemos a pedir los valores de fábrica al servidor.
      sessionStorage.removeItem(SESSION_KEY);
    } else {
      // Carga de página: si ya hay una sesión (edición previa), la reutilizamos
      // en vez de pisarla. El reinicio desde /i solo ocurre la primera vez
      // (cuando todavía no existe nada guardado en sessionStorage).
      const sessionRaw = sessionStorage.getItem(SESSION_KEY);
      if (sessionRaw) {
        datos = JSON.parse(sessionRaw);
        cargadoDeSesion = true;
      }
    }

    if (!cargadoDeSesion) {
      const resp = await fetch(urlBase('/i'));
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      datos = await resp.json();
      guardarEnSesion();
    }

    renderizarTabs();
    mostrarEstado(cargadoDeSesion ? 'Inputs recuperados de la sesión.' : 'Inputs cargados correctamente.', 'ok');

    // El informe se renderiza siempre con lo que haya en la sesión en ese momento
    // (los valores de /i la primera vez, o lo último editado en cargas posteriores).
    await generarPdf();
  } catch (e) {
    mostrarEstado(`Error cargando inputs: ${e.message}`, 'error');
  }
}

const TAB_INFORME = '__informe_pdf__';

function crearTabInforme(panels) {
  const boton = document.createElement('button');
  boton.type = 'button';
  boton.className = 'tab-btn';
  boton.dataset.tab = TAB_INFORME;
  boton.textContent = 'Informe';
  boton.addEventListener('click', () => activarTab(TAB_INFORME));

  const panel = document.createElement('div');
  panel.className = 'tab-panel';
  panel.id = `tab-${TAB_INFORME}`;
  panel.innerHTML = `
    <div id="visor"></div>
    <a id="visorDescargar" download="informe.pdf" class="btn-descargar-flotante" title="Descargar PDF">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
      </svg>
      <span class="etiqueta">Descargar PDF</span>
    </a>
  `;
  panels.appendChild(panel);

  return boton;
}

function renderizarTabs() {
  const nav = document.getElementById('tabsNav');
  const panels = document.getElementById('tabsPanels');
  nav.innerHTML = '';
  panels.innerHTML = '';

  // Pestaña fija con el informe renderizado; activa por defecto, pero se coloca
  // a la derecha del resto de pestañas.
  const botonInforme = crearTabInforme(panels);

  Object.keys(datos).forEach((clave) => {
    const boton = document.createElement('button');
    boton.type = 'button';
    boton.className = 'tab-btn';
    boton.dataset.tab = clave;
    boton.textContent = clave;
    boton.addEventListener('click', () => activarTab(clave));
    nav.appendChild(boton);

    const panel = document.createElement('div');
    panel.className = 'tab-panel';
    panel.id = `tab-${clave}`;
    panels.appendChild(panel);

    renderizarHoja(clave, panel);
  });

  nav.appendChild(botonInforme);

  const info = document.createElement('span');
  info.id = 'visorInfo';
  info.className = 'info-paginas';
  nav.appendChild(info);

  activarTab(TAB_INFORME);
}

function activarTab(id) {
  document.querySelectorAll('#tabsNav .tab-btn').forEach((b) => b.classList.toggle('activa', b.dataset.tab === id));
  document.querySelectorAll('#tabsPanels .tab-panel').forEach((p) => p.classList.toggle('activa', p.id === `tab-${id}`));
}

// --- Agrupación recursiva por las dos primeras columnas ---

function agruparFilas(filasConIndice, columnas) {
  if (columnas.length === 0) {
    return { tipo: 'hojas', filas: filasConIndice };
  }
  const [colIdx, ...resto] = columnas;
  const grupos = new Map();
  filasConIndice.forEach((item) => {
    const valor = (item.fila[colIdx] ?? '').toString().trim() || '(sin valor)';
    if (!grupos.has(valor)) grupos.set(valor, []);
    grupos.get(valor).push(item);
  });

  const hijos = [];
  grupos.forEach((items, valor) => {
    hijos.push({ colIdx, valor, arbol: agruparFilas(items, resto) });
  });

  return { tipo: 'grupo', hijos };
}

function contarFilas(nodo) {
  if (nodo.tipo === 'hojas') return nodo.filas.length;
  return nodo.hijos.reduce((acc, h) => acc + contarFilas(h.arbol), 0);
}

function renderizarHoja(clave, contenedor) {
  contenedor.innerHTML = '';

  const filas = datos[clave] || [];
  const cabecera = filas[0] || [];
  const filasConIndice = filas.slice(1).map((fila, i) => ({ indiceFila: i + 1, fila }));

  // Solo agrupamos si quedan columnas de datos además de las dos usadas para agrupar.
  const columnasAgrupables = cabecera.length > 2 ? [0, 1] : [];
  const arbol = agruparFilas(filasConIndice, columnasAgrupables);

  renderizarNodo(arbol, contenedor, {
    clave,
    cabecera,
    columnasOcultas: columnasAgrupables,
    rutaGrupo: [],
    onCambio: () => renderizarHoja(clave, contenedor),
  });
}

function renderizarNodo(nodo, contenedor, ctx) {
  if (nodo.tipo === 'hojas') {
    renderizarTablaFilas(nodo.filas, contenedor, ctx);
    return;
  }

  const nombreGrupo = ['grp', ctx.clave, ctx.rutaGrupo.length, ...ctx.rutaGrupo.map((r) => r.valor)]
    .join('-')
    .replace(/[^a-zA-Z0-9_-]/g, '_');

  nodo.hijos.forEach(({ colIdx, valor, arbol }, i) => {
    const details = document.createElement('details');
    details.className = 'grupo-detalle';
    details.name = nombreGrupo; // hace que los hermanos del mismo nivel se colapsen entre sí
    details.open = i === 0;

    const summary = document.createElement('summary');
    summary.textContent = `${ctx.cabecera[colIdx] ?? `Col ${colIdx + 1}`}: ${valor} (${contarFilas(arbol)})`;
    details.appendChild(summary);

    const cuerpo = document.createElement('div');
    cuerpo.className = 'grupo-cuerpo';
    details.appendChild(cuerpo);

    renderizarNodo(arbol, cuerpo, { ...ctx, rutaGrupo: [...ctx.rutaGrupo, { colIdx, valor }] });

    contenedor.appendChild(details);
  });
}

function renderizarTablaFilas(filasConIndice, contenedor, ctx) {
  const { clave, cabecera, columnasOcultas, rutaGrupo, onCambio } = ctx;
  const colsVisibles = cabecera.map((_, i) => i).filter((i) => !columnasOcultas.includes(i));

  const wrap = document.createElement('div');
  wrap.className = 'hoja-wrap';
  const tabla = document.createElement('table');

  const thead = document.createElement('thead');
  const trHead = document.createElement('tr');
  colsVisibles.forEach((i) => {
    const th = document.createElement('th');
    th.textContent = cabecera[i];
    trHead.appendChild(th);
  });
  const thAcciones = document.createElement('th');
  thAcciones.className = 'col-acciones';
  trHead.appendChild(thAcciones);
  thead.appendChild(trHead);
  tabla.appendChild(thead);

  const tbody = document.createElement('tbody');
  filasConIndice.forEach(({ indiceFila }) => {
    tbody.appendChild(crearFila(clave, indiceFila, colsVisibles, onCambio));
  });
  tabla.appendChild(tbody);

  wrap.appendChild(tabla);
  contenedor.appendChild(wrap);

  const btnAdd = document.createElement('button');
  btnAdd.type = 'button';
  btnAdd.className = 'secondary btn-mini';
  btnAdd.textContent = '+ Añadir fila';
  btnAdd.addEventListener('click', () => {
    const nuevaFila = new Array(cabecera.length).fill('');
    rutaGrupo.forEach(({ colIdx, valor }) => { nuevaFila[colIdx] = valor; });
    datos[clave].push(nuevaFila);
    guardarEnSesion();
    onCambio();
  });
  contenedor.appendChild(btnAdd);
}

function crearFila(clave, indiceFila, colsVisibles, onCambio) {
  const tr = document.createElement('tr');
  const fila = datos[clave][indiceFila];

  colsVisibles.forEach((c) => {
    const td = document.createElement('td');
    const input = document.createElement('input');
    input.type = 'text';
    input.value = fila[c] ?? '';
    input.addEventListener('input', (e) => {
      datos[clave][indiceFila][c] = e.target.value;
      guardarEnSesion();
    });
    td.appendChild(input);
    tr.appendChild(td);
  });

  const tdAcciones = document.createElement('td');
  tdAcciones.className = 'col-acciones';
  const btnDel = document.createElement('button');
  btnDel.type = 'button';
  btnDel.className = 'secondary btn-mini';
  btnDel.textContent = '✕';
  btnDel.title = 'Eliminar fila';
  btnDel.addEventListener('click', () => {
    datos[clave].splice(indiceFila, 1);
    guardarEnSesion();
    onCambio();
  });
  tdAcciones.appendChild(btnDel);
  tr.appendChild(tdAcciones);

  return tr;
}

function construirPayload() {
  // Enviamos lo que hay guardado en la sesión (igual que handleExportProject
  // en AppXLS.jsx lee sessionStorage.getItem("excelData") en vez del state en memoria).
  const sessionRaw = sessionStorage.getItem(SESSION_KEY);
  if (sessionRaw) {
    try {
      return JSON.parse(sessionRaw);
    } catch (e) {
      console.error('Error al leer el JSON de la sesión, se usa el estado en memoria', e);
    }
  }
  return datos;
}

// ==========================================
// Exportar excelData (sesión) a un .xlsx
// ==========================================

// El título del informe vive en la hoja "PDF" como fila ["", "Proyecto", "nombre", <valor>],
// igual que ss.nombredocumento en el pipeline de Typst; si no aparece, caemos al <title>.
function obtenerTituloProyecto(datosSesion) {
  const filas = datosSesion.PDF || [];
  const cabecera = filas[0] || [];
  const idxCategoria = cabecera.indexOf('Categoría');
  const idxVariable = cabecera.indexOf('Variable');
  const idxValor = cabecera.indexOf('valor');
  if (idxCategoria === -1 || idxVariable === -1 || idxValor === -1) return null;

  const fila = filas
    .slice(1)
    .find((f) => f[idxCategoria] === 'Proyecto' && f[idxVariable] === 'nombre');

  const valor = fila ? String(fila[idxValor] ?? '').trim() : '';
  return valor || null;
}

function sanearNombreArchivo(texto) {
  return String(texto).trim().replace(/[\\/:*?"<>|]+/g, '_').replace(/\s+/g, '_');
}

function exportarExcel() {
  try {
    const datosSesion = construirPayload();
    const titulo = obtenerTituloProyecto(datosSesion) || document.title || 'excelData';

    const wb = XLSX.utils.book_new();
    Object.keys(datosSesion).forEach((clave) => {
      const ws = XLSX.utils.aoa_to_sheet(datosSesion[clave] || []);
      // Los nombres de hoja de Excel admiten máx. 31 caracteres y no : \ / ? * [ ]
      const nombreHoja = clave.replace(/[:\\/?*[\]]/g, '_').slice(0, 31) || 'Hoja';
      XLSX.utils.book_append_sheet(wb, ws, nombreHoja);
    });

    XLSX.writeFile(wb, `${sanearNombreArchivo(titulo)}.xlsx`);
    mostrarEstado('Excel exportado correctamente.', 'ok');
  } catch (e) {
    mostrarEstado(`Error exportando Excel: ${e.message}`, 'error');
  }
}

// ==========================================
// Importar un .xlsx a la variable de sesión (excelData)
// ==========================================

async function importarExcel(file) {
  mostrarEstado('Importando Excel…');
  try {
    const buffer = await file.arrayBuffer();
    const wb = XLSX.read(buffer, { type: 'array' });

    const nuevosDatos = {};
    wb.SheetNames.forEach((nombreHoja) => {
      // header: 1 -> array-of-arrays (fila 0 = cabecera), igual que el formato de /i.
      nuevosDatos[nombreHoja] = XLSX.utils.sheet_to_json(wb.Sheets[nombreHoja], {
        header: 1,
        blankrows: false,
        defval: '',
      });
    });

    datos = nuevosDatos;
    guardarEnSesion();
    renderizarTabs();
    mostrarEstado('Excel importado correctamente.', 'ok');

    await generarPdf();
  } catch (e) {
    mostrarEstado(`Error importando Excel: ${e.message}`, 'error');
  }
}

// ==========================================
// Visor de PDF (pestaña "Informe PDF")
// ==========================================

let urlPdfActual = null;

async function mostrarPdf(blob) {
  if (urlPdfActual) URL.revokeObjectURL(urlPdfActual);
  urlPdfActual = URL.createObjectURL(blob);

  const enlaceDescarga = document.getElementById('visorDescargar');
  if (enlaceDescarga) enlaceDescarga.href = urlPdfActual;

  const contenedor = document.getElementById('visor');
  if (!contenedor) return; // la pestaña "Informe PDF" aún no se ha renderizado
  contenedor.innerHTML = '';

  const infoEl = document.getElementById('visorInfo');
  const ratio = window.devicePixelRatio || 1;
  const arrayBuffer = await blob.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

  for (let numPagina = 1; numPagina <= pdf.numPages; numPagina++) {
    if (infoEl) infoEl.textContent = `Renderizando página ${numPagina} de ${pdf.numPages}…`;

    const pagina = await pdf.getPage(numPagina);
    // Escalamos cada página al ancho disponible del contenedor (menos el padding).
    const anchoDisponible = contenedor.clientWidth - 12 || 800;
    const escala = anchoDisponible / pagina.getViewport({ scale: 1 }).width;
    const viewport = pagina.getViewport({ scale: escala });

    const canvas = document.createElement('canvas');
    canvas.width = viewport.width * ratio;
    canvas.height = viewport.height * ratio;
    canvas.style.width = `${viewport.width}px`;
    canvas.style.height = `${viewport.height}px`;

    const contexto = canvas.getContext('2d');
    contexto.scale(ratio, ratio);
    await pagina.render({ canvasContext: contexto, viewport }).promise;

    contenedor.appendChild(canvas);
  }

  if (infoEl) infoEl.textContent = `${pdf.numPages} página${pdf.numPages === 1 ? '' : 's'}`;
}

// ==========================================
// Acciones principales
// ==========================================

async function generarPdf() {
  const boton = document.getElementById('btnGenerar');
  boton.disabled = true;
  mostrarEstado('Generando PDF…');

  try {
    const payload = construirPayload();
    const resp = await fetch(document.getElementById('apiUrl').value, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!resp.ok) {
      const texto = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${texto}`);
    }

    const blob = await resp.blob();
    await mostrarPdf(blob);
    mostrarEstado('PDF generado correctamente.', 'ok');
  } catch (e) {
    mostrarEstado(`Error: ${e.message}`, 'error');
  } finally {
    boton.disabled = false;
  }
}

document.getElementById('formulario').addEventListener('submit', (ev) => {
  ev.preventDefault();
  generarPdf();
});

document.getElementById('btnExportarExcel').addEventListener('click', exportarExcel);

document.getElementById('btnImportarExcel').addEventListener('click', () => {
  document.getElementById('inputImportarExcel').click();
});

document.getElementById('inputImportarExcel').addEventListener('change', async (ev) => {
  const file = ev.target.files[0];
  ev.target.value = ''; // permite volver a importar el mismo archivo si hace falta
  if (file) await importarExcel(file);
});

cargarInputs();
</script>
