<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clasificador de Imágenes - Teachable Machine</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f4f4;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
}

h1{
    color:#333;
}

button{
    padding:15px 30px;
    font-size:16px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    background:#4CAF50;
    color:white;
}

button:hover{
    background:#45a049;
}

#status{
    margin-top:20px;
    font-weight:bold;
    color:#1565c0;
}

#webcam-container{
    margin-top:20px;
}

canvas{
    border-radius:10px;
    border:3px solid white;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

#label-container{
    margin-top:20px;
    width:250px;
}

.label-item{
    background:white;
    margin:8px 0;
    padding:10px;
    border-radius:6px;
    box-shadow:0 0 5px rgba(0,0,0,.1);
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

</head>

<body>

<h1>Clasificador de Imágenes</h1>

<button onclick="init()">Iniciar cámara</button>

<div id="status">
Esperando...
</div>

<div id="webcam-container"></div>

<div id="label-container"></div>

<script>

const URL="./my_model/";

let model;
let webcam;
let labelContainer;
let maxPredictions;
let iniciado=false;

async function init(){

    if(iniciado){
        return;
    }

    iniciado=true;

    const status=document.getElementById("status");

    try{

        if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
            throw new Error("Este navegador no soporta acceso a la cámara.");
        }

        status.innerHTML="Cargando modelo...";

        const modelURL=URL+"model.json";
        const metadataURL=URL+"metadata.json";

        model=await tmImage.load(modelURL,metadataURL);

        maxPredictions=model.getTotalClasses();

        status.innerHTML="Solicitando acceso a la cámara...";

        webcam=new tmImage.Webcam(300,300,true);

        await webcam.setup();

        await webcam.play();

        document.getElementById("webcam-container").innerHTML="";

        document.getElementById("webcam-container").appendChild(webcam.canvas);

        labelContainer=document.getElementById("label-container");
        labelContainer.innerHTML="";

        for(let i=0;i<maxPredictions;i++){

            let div=document.createElement("div");

            div.className="label-item";

            div.innerHTML="Esperando...";

            labelContainer.appendChild(div);

        }

        status.innerHTML="Cámara iniciada correctamente.";

        window.requestAnimationFrame(loop);

    }

    catch(error){

        iniciado=false;

        console.error(error);

        status.innerHTML="<span style='color:red'>ERROR</span>";

        alert(
            "No se pudo iniciar la aplicación.\n\n"+
            error.message+
            "\n\nRevisa la consola (F12)."
        );

    }

}

async function loop(){

    webcam.update();

    await predict();

    window.requestAnimationFrame(loop);

}

async function predict(){

    const prediction=await model.predict(webcam.canvas);

    for(let i=0;i<maxPredictions;i++){

        const texto=
            prediction[i].className+
            " : "+
            (prediction[i].probability*100).toFixed(2)+
            "%";

        labelContainer.childNodes[i].innerHTML=texto;

    }

}

</script>

</body>
</html>
